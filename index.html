<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>Park-Ups</title>
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Park-Ups" />
<meta name="theme-color" content="#12181A" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2312181A'/%3E%3Ccircle cx='50' cy='50' r='28' fill='none' stroke='%23E4A23A' stroke-width='5'/%3E%3Ccircle cx='50' cy='50' r='4' fill='%23E4A23A'/%3E%3Cpath d='M50 26 L56 46 L50 50 L44 46 Z' fill='%23E4A23A'/%3E%3C/svg%3E" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2312181A'/%3E%3Ccircle cx='50' cy='50' r='28' fill='none' stroke='%23E4A23A' stroke-width='5'/%3E%3Ccircle cx='50' cy='50' r='4' fill='%23E4A23A'/%3E%3Cpath d='M50 26 L56 46 L50 50 L44 46 Z' fill='%23E4A23A'/%3E%3C/svg%3E" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap');

  :root {
    --ink: #12181A;
    --panel: #1C2528;
    --paper: #EFE8D8;
    --paper-dim: #9BA79E;
    --amber: #E4A23A;
    --amber-hi: #EFB159;
    --moss: #6B8F6E;
    --rust: #C1573A;
    --line: rgba(239,232,216,0.10);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--ink); color: var(--paper); }
  body {
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .display { font-family: 'Fraunces', serif; font-optical-sizing: auto; }
  .mono { font-family: 'IBM Plex Mono', monospace; }
  #app { max-width: 480px; margin: 0 auto; min-height: 100dvh; display: flex; flex-direction: column; position: relative; }

  header { padding: 28px 20px 18px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; }
  .eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--moss); margin-bottom: 4px; }
  h1 { font-size: 28px; font-weight: 600; margin: 0; }
  .compass-badge { width: 44px; height: 44px; border-radius: 999px; background: var(--panel); border: 1px solid rgba(228,162,58,0.3); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  main { flex: 1; padding: 20px; padding-bottom: 100px; }

  /* Empty state */
  .empty { text-align: center; padding: 70px 16px; }
  .empty-icon { width: 56px; height: 56px; border-radius: 999px; margin: 0 auto 16px; background: var(--panel); border: 1px dashed rgba(239,232,216,0.2); display: flex; align-items: center; justify-content: center; }
  .empty p.title { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600; margin: 0 0 6px; }
  .empty p.sub { font-size: 14px; color: var(--paper-dim); margin: 0 0 24px; line-height: 1.5; }

  /* Ticket card */
  .ticket { background: var(--panel); border: 1px solid var(--line); border-left: none; border-radius: 10px; overflow: hidden; margin-bottom: 12px; position: relative; padding-left: 3px; }
  .ticket::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background-image: repeating-linear-gradient(to bottom, var(--amber) 0px, var(--amber) 6px, transparent 6px, transparent 13px); }
  .ticket-main { display: flex; gap: 12px; padding: 14px; width: 100%; text-align: left; background: none; border: none; color: inherit; cursor: pointer; font: inherit; }
  .ticket-thumb { width: 64px; height: 64px; border-radius: 8px; flex-shrink: 0; overflow: hidden; background: var(--ink); display: flex; align-items: center; justify-content: center; }
  .ticket-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .ticket-body { flex: 1; min-width: 0; }
  .ticket-title { font-family: 'Fraunces', serif; font-weight: 600; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ticket-notes { font-size: 12px; color: var(--paper-dim); margin: 4px 0 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; }
  .ticket-footer { display: flex; align-items: center; justify-content: space-between; padding: 8px 14px; border-top: 1px solid rgba(239,232,216,0.06); }
  .ticket-time { font-size: 11px; color: var(--moss); }
  .ticket-actions { display: flex; align-items: center; gap: 2px; }
  .icon-btn { border: none; background: none; color: var(--paper-dim); padding: 6px; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .icon-btn:hover { background: rgba(239,232,216,0.06); }
  .confirm-btn { font-size: 11px; padding: 5px 9px; border-radius: 6px; font-weight: 600; background: var(--rust); color: var(--ink); border: none; cursor: pointer; }

  .coord-chip { font-family: 'IBM Plex Mono', monospace; display: inline-flex; align-items: center; gap: 6px; background: var(--ink); color: var(--amber); border: 1px solid rgba(228,162,58,0.25); border-radius: 6px; padding: 4px 8px; font-size: 12px; }
  .coord-chip.lg { padding: 8px 12px; font-size: 14px; }

  /* Buttons */
  .btn { border: none; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 12px; }
  .btn-primary { background: var(--amber); color: var(--ink); }
  .btn-primary:hover { background: var(--amber-hi); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary { background: var(--panel); color: var(--paper); }
  .btn-outline-danger { background: transparent; color: var(--rust); border: 1px solid rgba(193,87,58,0.35); }
  .btn-danger { background: var(--rust); color: var(--ink); }
  .btn-full { width: 100%; }
  .btn-row { display: flex; gap: 8px; margin-top: 24px; }
  .btn-row > * { flex: 1; }

  .fab { position: fixed; bottom: 24px; left: 50%; transform: translateX(calc(-50% + 155px)); background: var(--amber); color: var(--ink); border: none; border-radius: 999px; padding: 14px 20px; font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); cursor: pointer; }
  @media (max-width: 480px) { .fab { transform: none; right: 20px; left: auto; } }

  /* Form */
  .form-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .form-header h2 { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 600; margin: 0; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--paper-dim); margin-bottom: 6px; }
  .field input[type=text], .field textarea, .coord-input { width: 100%; background: var(--ink); border: 1px solid rgba(239,232,216,0.14); color: var(--paper); border-radius: 8px; padding: 11px 12px; font-size: 14px; font-family: 'Inter', sans-serif; }
  .coord-input { font-family: 'IBM Plex Mono', monospace; }
  .field input:focus, .field textarea:focus { outline: none; border-color: var(--amber); box-shadow: 0 0 0 3px rgba(228,162,58,0.15); }
  .field textarea { resize: none; }
  .coord-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .geo-btn { font-size: 12px; background: var(--panel); color: var(--amber); border: 1px solid rgba(228,162,58,0.25); border-radius: 8px; padding: 8px 12px; display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }
  .geo-btn:disabled { opacity: 0.6; }
  .error-text { font-size: 12px; color: var(--rust); margin-top: 6px; }

  .photo-drop { width: 100%; background: var(--ink); border: 1px dashed rgba(239,232,216,0.2); color: var(--paper-dim); border-radius: 8px; padding: 32px 0; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; font-size: 12px; }
  .photo-preview { position: relative; height: 160px; border-radius: 8px; overflow: hidden; }
  .photo-preview img { width: 100%; height: 100%; object-fit: cover; }
  .photo-remove { position: absolute; top: 8px; right: 8px; background: rgba(18,24,26,0.8); color: var(--paper); border: none; border-radius: 999px; padding: 6px; cursor: pointer; display: flex; }

  /* Detail */
  .back-link { background: none; border: none; color: var(--paper-dim); font-size: 12px; cursor: pointer; margin-bottom: 16px; display: inline-flex; align-items: center; gap: 4px; padding: 0; }
  .detail-photo { border-radius: 10px; overflow: hidden; height: 200px; margin-bottom: 16px; }
  .detail-photo img { width: 100%; height: 100%; object-fit: cover; }
  .detail-photo.empty-photo { background: var(--panel); border: 1px dashed rgba(239,232,216,0.15); height: 120px; display: flex; align-items: center; justify-content: center; }
  .detail-title { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 600; margin: 0 0 10px; }
  .detail-coord-row { display: flex; align-items: center; gap: 8px; margin-bottom: 18px; }
  .detail-notes { font-size: 14px; line-height: 1.6; margin: 0 0 20px; }
  .detail-meta { font-size: 12px; color: var(--moss); margin: 0 0 24px; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .detail-grid a { text-decoration: none; }

  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--panel); color: var(--paper); font-size: 13px; padding: 10px 16px; border-radius: 999px; border: 1px solid var(--line); box-shadow: 0 8px 24px rgba(0,0,0,0.35); opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 50; }
  .toast.show { opacity: 1; }

  a { color: inherit; }
  ::selection { background: rgba(228,162,58,0.3); }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>

<script>
(function () {
  "use strict";

  var STORAGE_KEY = "parkups_v1";
  var state = {
    spots: [],
    view: "list", // list | form | detail
    editingId: null,
    detailId: null,
    confirmDeleteId: null,
    geoStatus: "idle",
    photoDraft: null,
    photoError: null,
    saving: false,
    copiedId: null,
  };

  // ---------- persistence ----------
  function loadSpots() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      var arr = raw ? JSON.parse(raw) : [];
      arr.sort(function (a, b) { return b.createdAt - a.createdAt; });
      return arr;
    } catch (e) {
      return [];
    }
  }
  function persist() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.spots));
      return true;
    } catch (e) {
      showToast("Storage is full — try removing a photo or an old spot.");
      return false;
    }
  }

  // ---------- helpers ----------
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 9); }
  function fmt(v) { var n = Number(v); return isNaN(n) ? "—" : n.toFixed(6); }
  function esc(s) {
    return String(s || "").replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }
  function timeAgo(ts) {
    var diff = Date.now() - ts, day = 86400000;
    if (diff < 3600000) return "just now";
    if (diff < day) return Math.floor(diff / 3600000) + "h ago";
    var days = Math.floor(diff / day);
    if (days === 1) return "yesterday";
    if (days < 30) return days + "d ago";
    return new Date(ts).toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
  }
  function showToast(msg) {
    var t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(showToast._tm);
    showToast._tm = setTimeout(function () { t.classList.remove("show"); }, 2200);
  }
  function compressImage(file, maxWidth, quality) {
    return new Promise(function (resolve, reject) {
      var reader = new FileReader();
      reader.onerror = function () { reject(new Error("read failed")); };
      reader.onload = function (ev) {
        var img = new Image();
        img.onerror = function () { reject(new Error("decode failed")); };
        img.onload = function () {
          var scale = Math.min(1, maxWidth / img.width);
          var canvas = document.createElement("canvas");
          canvas.width = Math.round(img.width * scale);
          canvas.height = Math.round(img.height * scale);
          var ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          resolve(canvas.toDataURL("image/jpeg", quality));
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  // ---------- icons (minimal inline SVG) ----------
  var ICONS = {
    compass: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>',
    compassSm: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>',
    plus: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
    pin: '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>',
    camera: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>',
    imageOff: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="2" y1="2" x2="22" y2="22"/><path d="M10.41 10.41a2 2 0 1 1-2.83-2.83"/><line x1="13.5" y1="13.5" x2="6" y2="21"/><path d="M18 21H4a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h1"/><path d="M21 15V5a2 2 0 0 0-2-2H9"/></svg>',
    nav: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>',
    copy: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>',
    check: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>',
    pencil: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>',
    trash: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
    x: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
    loader: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 0.8s linear infinite"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>'
  };
  var styleSpin = document.createElement("style");
  styleSpin.textContent = "@keyframes spin{to{transform:rotate(360deg)}}";
  document.head.appendChild(styleSpin);

  function coordChip(lat, lng, lg) {
    return '<span class="coord-chip' + (lg ? " lg" : "") + '">' + ICONS.compassSm + '<span>' + fmt(lat) + ', ' + fmt(lng) + '</span></span>';
  }

  // ---------- rendering ----------
  var app = document.getElementById("app");

  function render() {
    var html = '<header><div><div class="eyebrow">Private log &middot; ' + state.spots.length + (state.spots.length === 1 ? " spot" : " spots") + '</div><h1 class="display">Park-Ups</h1></div><div class="compass-badge" style="color:#E4A23A">' + ICONS.compass + '</div></header>';
    html += '<main id="main"></main>';
    if (state.view === "list") {
      html += '<button class="fab" id="fabAdd">' + ICONS.plus + 'Log a spot</button>';
    }
    app.innerHTML = html;
    renderMain();
    attachHeaderListeners();
  }

  function attachHeaderListeners() {
    var fab = document.getElementById("fabAdd");
    if (fab) fab.addEventListener("click", openAddForm);
  }

  function renderMain() {
    var main = document.getElementById("main");
    if (state.view === "list") main.innerHTML = renderList();
    else if (state.view === "form") main.innerHTML = renderForm();
    else if (state.view === "detail") main.innerHTML = renderDetail();
    attachMainListeners();
  }

  function renderList() {
    if (state.spots.length === 0) {
      return '<div class="empty"><div class="empty-icon">' + ICONS.pin + '</div>' +
        '<p class="title display">No spots logged yet</p>' +
        '<p class="sub">Find a good place to park up, then add it here — pin, notes, and a photo if you\'ve got one.</p>' +
        '<button class="btn btn-primary" id="emptyAdd">' + ICONS.plus + 'Log your first spot</button></div>';
    }
    var html = '<div>';
    state.spots.forEach(function (s) {
      var copied = state.copiedId === s.id;
      var confirming = state.confirmDeleteId === s.id;
      html += '<div class="ticket" data-id="' + s.id + '">';
      html += '<button class="ticket-main" data-open="' + s.id + '">';
      html += '<div class="ticket-thumb">' + (s.photo ? '<img src="' + s.photo + '" alt="" />' : ICONS.imageOff) + '</div>';
      html += '<div class="ticket-body"><div class="ticket-title display">' + esc(s.title) + '</div>';
      if (s.notes) html += '<p class="ticket-notes">' + esc(s.notes) + '</p>';
      html += '<div style="margin-top:8px">' + coordChip(s.lat, s.lng) + '</div></div></button>';
      html += '<div class="ticket-footer"><span class="ticket-time">' + timeAgo(s.createdAt) + '</span>';
      html += '<div class="ticket-actions">';
      html += '<a class="icon-btn" href="https://www.google.com/maps/search/?api=1&query=' + s.lat + ',' + s.lng + '" target="_blank" rel="noopener noreferrer" title="Directions">' + ICONS.nav + '</a>';
      html += '<button class="icon-btn" data-copy="' + s.id + '" title="Copy coordinates" style="' + (copied ? "color:#6B8F6E" : "") + '">' + (copied ? ICONS.check : ICONS.copy) + '</button>';
      html += '<button class="icon-btn" data-edit="' + s.id + '" title="Edit">' + ICONS.pencil + '</button>';
      if (confirming) html += '<button class="confirm-btn" data-delete="' + s.id + '">Confirm</button>';
      else html += '<button class="icon-btn" data-confirm="' + s.id + '" title="Delete">' + ICONS.trash + '</button>';
      html += '</div></div></div>';
    });
    html += '</div>';
    return html;
  }

  function renderForm() {
    var editing = !!state.editingId;
    var d = state.formDraft;
    var geoBtnLabel = state.geoStatus === "loading" ? "Finding you…" : "Use current location";
    var html = '<div class="form-header"><h2>' + (editing ? "Edit spot" : "New spot") + '</h2><button class="icon-btn" id="formClose">' + ICONS.x + '</button></div>';

    html += '<div class="field"><label>Name</label><input type="text" id="fTitle" placeholder="e.g. Layby above the loch" value="' + esc(d.title) + '" /></div>';

    html += '<div class="field"><label>Coordinates</label><div class="coord-row">' +
      '<input class="coord-input" id="fLat" placeholder="Latitude" inputmode="decimal" value="' + esc(d.lat) + '" />' +
      '<input class="coord-input" id="fLng" placeholder="Longitude" inputmode="decimal" value="' + esc(d.lng) + '" />' +
      '</div>' +
      '<button class="geo-btn" id="fGeo" ' + (state.geoStatus === "loading" ? "disabled" : "") + '>' + (state.geoStatus === "loading" ? ICONS.loader : ICONS.compassSm) + geoBtnLabel + '</button>';
    if (state.geoStatus === "error") html += '<p class="error-text">Couldn\'t get your location — enter coordinates manually, or paste them from Maps.</p>';
    html += '</div>';

    html += '<div class="field"><label>Notes</label><textarea id="fNotes" rows="4" placeholder="Flat, quiet at night, water tap 200m, sketchy after dark…">' + esc(d.notes) + '</textarea></div>';

    html += '<div class="field"><label>Photo</label>';
    if (d.photo) {
      html += '<div class="photo-preview"><img src="' + d.photo + '" alt="" /><button class="photo-remove" id="fPhotoRemove">' + ICONS.x + '</button></div>';
    } else {
      html += '<button class="photo-drop" id="fPhotoAdd">' + ICONS.camera + '<span>Add a photo</span></button>';
    }
    html += '<input type="file" accept="image/*" id="fPhotoInput" style="display:none" />';
    if (state.photoError) html += '<p class="error-text">' + esc(state.photoError) + '</p>';
    html += '</div>';

    var canSave = d.lat !== "" && d.lng !== "" && !isNaN(parseFloat(d.lat)) && !isNaN(parseFloat(d.lng));
    html += '<div class="btn-row"><button class="btn btn-secondary" id="fCancel">Cancel</button>' +
      '<button class="btn btn-primary" id="fSave" ' + (!canSave || state.saving ? "disabled" : "") + '>' + (state.saving ? ICONS.loader : "") + (editing ? "Save changes" : "Save spot") + '</button></div>';

    return html;
  }

  function renderDetail() {
    var s = state.spots.find(function (x) { return x.id === state.detailId; });
    if (!s) return '';
    var copied = state.copiedId === s.id;
    var confirming = state.confirmDeleteId === s.id;
    var html = '<button class="back-link" id="dBack">&larr; All spots</button>';
    if (s.photo) html += '<div class="detail-photo"><img src="' + s.photo + '" alt="" /></div>';
    else html += '<div class="detail-photo empty-photo">' + ICONS.imageOff + '</div>';
    html += '<h2 class="detail-title">' + esc(s.title) + '</h2>';
    html += '<div class="detail-coord-row">' + coordChip(s.lat, s.lng, true) + '<button class="icon-btn" id="dCopy" style="background:#1C2528;' + (copied ? "color:#6B8F6E" : "") + '">' + (copied ? ICONS.check : ICONS.copy) + '</button></div>';
    if (s.notes) html += '<p class="detail-notes">' + esc(s.notes) + '</p>';
    html += '<p class="detail-meta">Logged ' + timeAgo(s.createdAt) + (s.updatedAt && s.updatedAt !== s.createdAt ? ' &middot; edited ' + timeAgo(s.updatedAt) : '') + '</p>';
    html += '<div class="detail-grid"><a class="btn btn-primary" href="https://www.google.com/maps/search/?api=1&query=' + s.lat + ',' + s.lng + '" target="_blank" rel="noopener noreferrer">' + ICONS.nav + 'Directions</a>' +
      '<button class="btn btn-secondary" id="dEdit">' + ICONS.pencil + 'Edit</button></div>';
    if (confirming) html += '<button class="btn btn-danger btn-full" id="dDelete">Confirm delete — this can\'t be undone</button>';
    else html += '<button class="btn btn-outline-danger btn-full" id="dConfirm">' + ICONS.trash + 'Delete spot</button>';
    return html;
  }

  // ---------- event wiring ----------
  function attachMainListeners() {
    if (state.view === "list") {
      var emptyAdd = document.getElementById("emptyAdd");
      if (emptyAdd) emptyAdd.addEventListener("click", openAddForm);
      document.querySelectorAll("[data-open]").forEach(function (el) {
        el.addEventListener("click", function () { openDetail(el.getAttribute("data-open")); });
      });
      document.querySelectorAll("[data-copy]").forEach(function (el) {
        el.addEventListener("click", function (e) { e.stopPropagation(); copyCoords(el.getAttribute("data-copy")); });
      });
      document.querySelectorAll("[data-edit]").forEach(function (el) {
        el.addEventListener("click", function (e) { e.stopPropagation(); openEditForm(el.getAttribute("data-edit")); });
      });
      document.querySelectorAll("[data-confirm]").forEach(function (el) {
        el.addEventListener("click", function (e) { e.stopPropagation(); state.confirmDeleteId = el.getAttribute("data-confirm"); renderMain(); });
      });
      document.querySelectorAll("[data-delete]").forEach(function (el) {
        el.addEventListener("click", function (e) { e.stopPropagation(); deleteSpot(el.getAttribute("data-delete")); });
      });
    } else if (state.view === "form") {
      document.getElementById("formClose").addEventListener("click", closeForm);
      document.getElementById("fCancel").addEventListener("click", closeForm);
      document.getElementById("fTitle").addEventListener("input", function (e) { state.formDraft.title = e.target.value; });
      document.getElementById("fLat").addEventListener("input", function (e) { state.formDraft.lat = e.target.value; toggleSaveEnabled(); });
      document.getElementById("fLng").addEventListener("input", function (e) { state.formDraft.lng = e.target.value; toggleSaveEnabled(); });
      document.getElementById("fNotes").addEventListener("input", function (e) { state.formDraft.notes = e.target.value; });
      document.getElementById("fGeo").addEventListener("click", useCurrentLocation);
      document.getElementById("fSave").addEventListener("click", saveSpot);
      var photoAdd = document.getElementById("fPhotoAdd");
      if (photoAdd) photoAdd.addEventListener("click", function () { document.getElementById("fPhotoInput").click(); });
      var photoRemove = document.getElementById("fPhotoRemove");
      if (photoRemove) photoRemove.addEventListener("click", function () { state.formDraft.photo = null; renderMain(); });
      document.getElementById("fPhotoInput").addEventListener("change", handlePhotoChange);
    } else if (state.view === "detail") {
      document.getElementById("dBack").addEventListener("click", function () { state.view = "list"; state.detailId = null; render(); });
      document.getElementById("dCopy").addEventListener("click", function () { copyCoords(state.detailId); });
      document.getElementById("dEdit").addEventListener("click", function () { openEditForm(state.detailId); });
      var dConfirm = document.getElementById("dConfirm");
      if (dConfirm) dConfirm.addEventListener("click", function () { state.confirmDeleteId = state.detailId; renderMain(); });
      var dDelete = document.getElementById("dDelete");
      if (dDelete) dDelete.addEventListener("click", function () { deleteSpot(state.detailId); });
    }
  }

  function toggleSaveEnabled() {
    var d = state.formDraft;
    var canSave = d.lat !== "" && d.lng !== "" && !isNaN(parseFloat(d.lat)) && !isNaN(parseFloat(d.lng));
    var btn = document.getElementById("fSave");
    if (btn) btn.disabled = !canSave || state.saving;
  }

  // ---------- actions ----------
  function openAddForm() {
    state.editingId = null;
    state.formDraft = { title: "", notes: "", lat: "", lng: "", photo: null };
    state.geoStatus = "idle";
    state.photoError = null;
    state.view = "form";
    render();
  }
  function openEditForm(id) {
    var s = state.spots.find(function (x) { return x.id === id; });
    if (!s) return;
    state.editingId = id;
    state.formDraft = { title: s.title, notes: s.notes || "", lat: String(s.lat), lng: String(s.lng), photo: s.photo || null };
    state.geoStatus = "idle";
    state.photoError = null;
    state.view = "form";
    render();
  }
  function closeForm() { state.view = "list"; render(); }
  function openDetail(id) { state.detailId = id; state.view = "detail"; render(); }

  function useCurrentLocation() {
    if (!navigator.geolocation) { state.geoStatus = "error"; renderMain(); return; }
    state.geoStatus = "loading";
    renderMain();
    navigator.geolocation.getCurrentPosition(
      function (pos) {
        state.formDraft.lat = pos.coords.latitude.toFixed(6);
        state.formDraft.lng = pos.coords.longitude.toFixed(6);
        state.geoStatus = "done";
        renderMain();
      },
      function () { state.geoStatus = "error"; renderMain(); },
      { enableHighAccuracy: true, timeout: 12000 }
    );
  }

  function handlePhotoChange(e) {
    var file = e.target.files && e.target.files[0];
    if (!file) return;
    state.photoError = null;
    compressImage(file, 900, 0.72).then(function (dataUrl) {
      state.formDraft.photo = dataUrl;
      renderMain();
    }).catch(function () {
      state.photoError = "Couldn't load that photo. Try a different one.";
      renderMain();
    });
  }

  function saveSpot() {
    var d = state.formDraft;
    var latNum = parseFloat(d.lat), lngNum = parseFloat(d.lng);
    if (isNaN(latNum) || isNaN(lngNum)) return;
    state.saving = true;
    renderMain();
    var id = state.editingId || uid();
    var existing = state.spots.find(function (x) { return x.id === id; });
    var spot = {
      id: id,
      title: d.title.trim() || "Unnamed spot",
      notes: d.notes.trim(),
      lat: latNum,
      lng: lngNum,
      photo: d.photo,
      createdAt: existing ? existing.createdAt : Date.now(),
      updatedAt: Date.now(),
    };
    state.spots = state.spots.filter(function (x) { return x.id !== id; });
    state.spots.unshift(spot);
    state.spots.sort(function (a, b) { return b.createdAt - a.createdAt; });
    var ok = persist();
    state.saving = false;
    if (ok) {
      state.view = "list";
      render();
    } else {
      renderMain();
    }
  }

  function deleteSpot(id) {
    state.spots = state.spots.filter(function (x) { return x.id !== id; });
    persist();
    state.confirmDeleteId = null;
    if (state.detailId === id) { state.view = "list"; state.detailId = null; }
    render();
  }

  function copyCoords(id) {
    var s = state.spots.find(function (x) { return x.id === id; });
    if (!s) return;
    var text = fmt(s.lat) + ", " + fmt(s.lng);
    var done = function () {
      state.copiedId = id;
      renderMain();
      setTimeout(function () { state.copiedId = null; renderMain(); }, 1500);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done).catch(function () { showToast("Copy: " + text); });
    } else {
      showToast("Copy: " + text);
    }
  }

  // ---------- init ----------
  state.spots = loadSpots();
  render();
})();
</script>
</body>
</html>
